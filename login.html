<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Shop - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8F9FD] min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-blue-700 italic">Double Shop</h1>
            <nav class="hidden md:flex space-x-8 text-gray-600 font-medium">
                <a href="#" onclick="window.location.href='home.html'" class="hover:text-blue-700">Home</a>
                <a href="#" class="hover:text-blue-700">Deals</a>
                <a href="#" class="hover:text-blue-700">Categories</a>
                <a href="#" class="hover:text-blue-700">Help</a>
            </nav>
            <div class="flex items-center space-x-5 text-gray-500">
                <button class="hover:text-blue-700"><i class="fa-solid fa-gear text-xl"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.04)] w-full max-w-[500px]">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome Back</h1>
                <p class="text-gray-500">Sign in to your account</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email or Phone Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="text" placeholder="Enter your email" 
                               class="w-full pl-11 pr-4 py-3 bg-[#F0F2F9] border-none rounded-lg focus:ring-2 focus:ring-blue-700 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-semibold text-gray-700">Password</label>
                        <a href="#" class="text-xs font-bold text-blue-700 hover:underline">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" placeholder="••••••••" 
                               class="w-full pl-11 pr-11 py-3 bg-[#F0F2F9] border-none rounded-lg focus:ring-2 focus:ring-blue-700 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-blue-700 border-gray-300 rounded focus:ring-blue-700">
                    <label for="remember" class="ml-3 text-sm text-gray-600">Remember me for 30 days</label>
                </div>

                <button onclick="window.location.href='profile.html'" type="submit" class="w-full bg-blue-700 hover:bg-blue-300 text-white font-semibold py-3.5 rounded-lg transition-all">
                    Login
                </button>

                <div class="relative flex items-center py-4">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-xs text-gray-400 font-medium uppercase tracking-widest">Or continue with</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button type="button" class="flex items-center justify-center space-x-2 py-3 border border-gray-100 bg-[#F0F2F9] rounded-lg hover:bg-gray-200 transition-all font-medium text-gray-700">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google">
                        <span>Google</span>
                    </button>
                    <button type="button" class="flex items-center justify-center space-x-2 py-3 border border-gray-100 bg-[#F0F2F9] rounded-lg hover:bg-gray-200 transition-all font-medium text-gray-700">
                        <i class="fa-brands fa-facebook text-[#1877F2] text-lg"></i>
                        <span>Facebook</span>
                    </button>
                </div>

                <div class="text-center pt-4 text-sm text-gray-500">
                    New to Double Shop? <a href="#" class="text-blue-700 font-bold hover:underline">Register now</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="px-12 py-8 flex flex-col md:flex-row justify-between items-center border-t border-gray-100 text-[13px] text-gray-500">
        <div class="mb-4 md:mb-0">
            <h1 class="text-2xl font-bold text-blue-700 italic">Double Shop</h1>
            <p>© 2026 Double Shop Digital Flagship. All Rights Reserved.</p>
        </div>
        <div class="flex space-x-6">
            <a href="#" class="hover:text-gray-800">Privacy Policy</a>
            <a href="#" class="hover:text-gray-800">Terms of Service</a>
            <a href="#" class="hover:text-gray-800">Shipping Info</a>
            <a href="#" class="hover:text-gray-800">Contact Us</a>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Login button clicked!');
        });
    </script>
</body>
</html>
